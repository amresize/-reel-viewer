<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes" />
    
    <!-- ═══════════════════════════════════════════════════ -->
    <!-- OPEN GRAPH TAGS (Updated via JavaScript)          -->
    <!-- ═══════════════════════════════════════════════════ -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://igshare.am-ip.hu/" />
    <meta property="og:title" content="✨ Reel Viewer" />
    <meta property="og:description" content="Watch Instagram Reels" />
    <meta property="og:image" content="https://igshare.am-ip.hu/default-og.jpg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:site_name" content="Reel Viewer" />
    
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="✨ Reel Viewer" />
    <meta name="twitter:description" content="Watch Instagram Reels instantly" />
    <meta name="twitter:image" content="https://igshare.am-ip.hu/default-og.jpg" />
    
    <title>✨ Reel Viewer</title>
    
    <style>
        :root {
            --neon-cyan: #00f0ff;
            --neon-pink: #ff00e6;
            --neon-purple: #b300ff;
            --neon-blue: #0066ff;
            --bg-dark: #0a0a12;
            --bg-card: rgba(15, 15, 30, 0.85);
            --text-primary: #ffffff;
            --text-secondary: rgba(255, 255, 255, 0.6);
            --border-glow: 0 0 20px rgba(0, 240, 255, 0.15);
            --font-main: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: var(--font-main);
            background: var(--bg-dark);
            background-image:
                radial-gradient(ellipse at 20% 50%, rgba(0, 240, 255, 0.05) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 50%, rgba(255, 0, 230, 0.05) 0%, transparent 60%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            color: var(--text-primary);
        }

        .container {
            position: relative;
            max-width: 680px;
            width: 100%;
            background: var(--bg-card);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 32px 28px;
            border: 1px solid rgba(0, 240, 255, 0.12);
            box-shadow: var(--border-glow), inset 0 1px 0 rgba(255, 255, 255, 0.05);
            z-index: 1;
            animation: fadeIn 0.6s ease-out;
        }

        .container::before {
            content: '';
            position: absolute;
            inset: -2px;
            border-radius: 26px;
            padding: 2px;
            background: conic-gradient(from 0deg, transparent, var(--neon-cyan), var(--neon-pink), var(--neon-purple), var(--neon-cyan), transparent);
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            opacity: 0.4;
            animation: rotateBorder 8s linear infinite;
            pointer-events: none;
        }

        @keyframes rotateBorder {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @keyframes fadeIn {
            0% { opacity: 0; transform: translateY(20px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        .header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 6px;
        }

        .logo-icon {
            font-size: 28px;
            filter: drop-shadow(0 0 10px rgba(0, 240, 255, 0.3));
            animation: pulseIcon 3s ease-in-out infinite;
        }

        @keyframes pulseIcon {
            0%, 100% { filter: drop-shadow(0 0 10px rgba(0, 240, 255, 0.3)); }
            50% { filter: drop-shadow(0 0 25px rgba(255, 0, 230, 0.4)); }
        }

        h1 {
            font-size: clamp(22px, 5vw, 28px);
            font-weight: 800;
            background: linear-gradient(135deg, var(--neon-cyan), var(--neon-pink));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.5px;
        }

        .subtitle {
            color: var(--text-secondary);
            font-size: clamp(13px, 2.5vw, 15px);
            margin-bottom: 24px;
            padding-left: 4px;
            font-weight: 400;
            letter-spacing: 0.3px;
        }

        .subtitle span {
            color: var(--neon-cyan);
            -webkit-text-fill-color: var(--neon-cyan);
        }

        .search-box {
            display: flex;
            gap: 12px;
            margin-bottom: 18px;
            flex-wrap: wrap;
        }

        .search-box input {
            flex: 1;
            min-width: 180px;
            padding: 14px 18px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(0, 240, 255, 0.15);
            border-radius: 14px;
            font-size: clamp(14px, 2.5vw, 16px);
            color: var(--text-primary);
            outline: none;
            transition: all 0.3s ease;
            font-family: var(--font-main);
            backdrop-filter: blur(10px);
        }

        .search-box input::placeholder {
            color: rgba(255, 255, 255, 0.3);
            font-weight: 300;
        }

        .search-box input:focus {
            border-color: var(--neon-cyan);
            box-shadow: 0 0 25px rgba(0, 240, 255, 0.1), inset 0 0 25px rgba(0, 240, 255, 0.03);
            background: rgba(255, 255, 255, 0.06);
        }

        .search-box button {
            padding: 14px 32px;
            background: linear-gradient(135deg, var(--neon-cyan), var(--neon-blue));
            color: #fff;
            border: none;
            border-radius: 14px;
            font-size: clamp(14px, 2.5vw, 16px);
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            white-space: nowrap;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            box-shadow: 0 0 30px rgba(0, 240, 255, 0.15);
            position: relative;
            overflow: hidden;
        }

        .search-box button::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, var(--neon-pink), var(--neon-purple));
            opacity: 0;
            transition: opacity 0.4s ease;
            border-radius: 14px;
        }

        .search-box button:hover::before {
            opacity: 1;
        }

        .search-box button:hover {
            transform: translateY(-2px) scale(1.02);
            box-shadow: 0 0 50px rgba(0, 240, 255, 0.25);
        }

        .search-box button:active {
            transform: scale(0.97);
        }

        .search-box button span {
            position: relative;
            z-index: 1;
        }

        #error {
            color: #ff4466;
            background: rgba(255, 68, 102, 0.08);
            border: 1px solid rgba(255, 68, 102, 0.2);
            padding: 12px 18px;
            border-radius: 12px;
            margin-bottom: 18px;
            display: none;
            font-size: 14px;
            backdrop-filter: blur(10px);
        }

        .share-section {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(0, 240, 255, 0.08);
            border-radius: 14px;
            padding: 12px 16px;
            margin-bottom: 20px;
            display: none;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }

        .share-section:hover {
            border-color: rgba(0, 240, 255, 0.2);
        }

        .share-section .label {
            font-size: 13px;
            color: var(--text-secondary);
            font-weight: 500;
            letter-spacing: 0.3px;
        }

        .share-section input {
            flex: 1;
            min-width: 140px;
            background: transparent;
            border: none;
            font-size: 13px;
            color: var(--text-primary);
            outline: none;
            padding: 4px 0;
            font-family: 'SF Mono', 'Fira Code', monospace;
            letter-spacing: 0.2px;
        }

        .share-section input::selection {
            background: rgba(0, 240, 255, 0.2);
            color: #fff;
        }

        .share-section button {
            background: none;
            border: none;
            color: var(--neon-cyan);
            font-weight: 600;
            font-size: 13px;
            cursor: pointer;
            padding: 6px 14px;
            border-radius: 8px;
            transition: all 0.3s ease;
            letter-spacing: 0.5px;
        }

        .share-section button:hover {
            background: rgba(0, 240, 255, 0.08);
            box-shadow: 0 0 20px rgba(0, 240, 255, 0.05);
        }

        #player-container {
            min-height: 420px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: rgba(255, 255, 255, 0.3);
            font-size: 14px;
            padding: 30px 20px;
            overflow: hidden;
            border: 1px solid rgba(0, 240, 255, 0.06);
            position: relative;
            transition: all 0.4s ease;
        }

        #player-container .placeholder-icon {
            font-size: 56px;
            margin-bottom: 14px;
            opacity: 0.4;
            filter: drop-shadow(0 0 30px rgba(0, 240, 255, 0.05));
        }

        #player-container iframe {
            max-width: 100%;
            border: none !important;
            border-radius: 12px;
            background: transparent;
            min-height: 450px;
            width: 100%;
        }

        .loading {
            color: var(--neon-cyan);
            animation: pulseText 1.4s ease-in-out infinite;
            font-weight: 500;
            letter-spacing: 0.5px;
        }

        @keyframes pulseText {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        .instagram-attribution {
            text-align: center;
            font-size: 11px;
            color: rgba(255, 255, 255, 0.25);
            margin-top: 12px;
            padding: 6px 0;
            letter-spacing: 0.5px;
        }

        .instagram-attribution a {
            color: var(--neon-cyan);
            text-decoration: none;
            transition: color 0.3s ease;
        }

        .instagram-attribution a:hover {
            color: var(--neon-pink);
        }

        @media (max-width: 600px) {
            .container {
                padding: 20px 16px;
                border-radius: 20px;
            }
            .search-box {
                flex-direction: column;
                gap: 10px;
            }
            .search-box input {
                min-width: auto;
                padding: 16px 18px;
                font-size: 16px;
            }
            .search-box button {
                width: 100%;
                justify-content: center;
                padding: 16px;
                font-size: 15px;
            }
            .share-section {
                flex-direction: column;
                align-items: stretch;
                gap: 8px;
                padding: 14px 16px;
            }
            .share-section input {
                min-width: auto;
                font-size: 12px;
                padding: 6px 0;
            }
            #player-container {
                min-height: 340px;
                padding: 20px 12px;
                border-radius: 12px;
            }
            #player-container iframe {
                min-height: 380px;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <span class="logo-icon">✦</span>
            <h1>Reel Viewer</h1>
        </div>
        <p class="subtitle">
            Paste any <span>public</span> Instagram Reel link to watch it here
        </p>

        <div id="error"></div>

        <div class="search-box">
            <input
            type="text"
            id="reelInput"
            placeholder="https://instagram.com/reel/..."
            spellcheck="false"
            autocomplete="off"
            />
            <button id="loadButton"><span>▶ Load Reel</span></button>
        </div>

        <div class="share-section" id="shareSection">
            <span class="label">🔗 Share</span>
            <input type="text" id="shareInput" readonly />
            <button id="copyButton">📋 Copy</button>
        </div>

        <div id="player-container">
            <div class="placeholder-icon">🎬</div>
            <span>Paste a link above to view the Reel</span>
        </div>

        <div class="instagram-attribution" id="attribution" style="display: none;">
            Content from <a href="https://instagram.com" target="_blank" rel="noopener">Instagram</a>
        </div>
    </div>

    <script>
        // ═══════════════════════════════════════════════════
        // MAIN APP SCRIPT
        // ═══════════════════════════════════════════════════

        const input = document.getElementById('reelInput');
        const loadBtn = document.getElementById('loadButton');
        const player = document.getElementById('player-container');
        const errorDiv = document.getElementById('error');
        const shareSection = document.getElementById('shareSection');
        const shareInput = document.getElementById('shareInput');
        const copyBtn = document.getElementById('copyButton');
        const attribution = document.getElementById('attribution');

        // --- Helper Functions ---
        function normalizeInstagramUrl(input) {
            let url = input.trim();
            if (/^[A-Za-z0-9_-]+$/.test(url)) {
                return `https://instagram.com/reel/${url}/`;
            }
            if (!url.startsWith('http://') && !url.startsWith('https://')) {
                url = 'https://' + url;
            }
            return url;
        }

        function extractReelId(url) {
            const match = url.match(/instagram\.com\/reel\/([A-Za-z0-9_-]+)/);
            return match ? match[1] : null;
        }

        function buildShareLink(reelId) {
            return `${window.location.origin}${window.location.pathname}?reel=${reelId}`;
        }

        // --- Update OG Tags (simple version) ---
        function updateOGTags(reelId, thumbnailUrl) {
            const baseUrl = 'https://igshare.am-ip.hu';
            const shareUrl = `${baseUrl}?reel=${reelId}`;
            
            // Update OG tags using querySelector
            const ogImage = document.querySelector('meta[property="og:image"]');
            const ogUrl = document.querySelector('meta[property="og:url"]');
            const twitterImage = document.querySelector('meta[name="twitter:image"]');
            
            if (ogImage && thumbnailUrl) {
                ogImage.setAttribute('content', thumbnailUrl);
            }
            if (ogUrl) {
                ogUrl.setAttribute('content', shareUrl);
            }
            if (twitterImage && thumbnailUrl) {
                twitterImage.setAttribute('content', thumbnailUrl);
            }
        }

        // --- Fetch Thumbnail from Instagram ---
        async function fetchReelThumbnail(reelId) {
            try {
                const apiUrl = `https://graph.facebook.com/v25.0/instagram_oembed?url=https://instagram.com/reel/${reelId}`;
                const response = await fetch(apiUrl);
                
                if (!response.ok) {
                    return null;
                }
                
                const data = await response.json();
                
                if (data.html) {
                    const imgMatch = data.html.match(/https:\/\/[^\s"']+\.(jpg|jpeg|png|webp)/i);
                    if (imgMatch) {
                        return imgMatch[0];
                    }
                }
                return null;
            } catch (error) {
                console.error('Error fetching thumbnail:', error);
                return null;
            }
        }

        // --- Load Reel with Iframe ---
        async function loadReelWithIframe(rawInput) {
            try {
                const normalizedUrl = normalizeInstagramUrl(rawInput);
                const reelId = extractReelId(normalizedUrl);

                if (!reelId) {
                    throw new Error('Invalid Instagram Reel URL. Please paste a link like: https://instagram.com/reel/...');
                }

                input.value = normalizedUrl;
                errorDiv.style.display = 'none';
                errorDiv.textContent = '';
                attribution.style.display = 'none';

                player.innerHTML = `<span class="loading">⏳ Loading Reel...</span>`;

                // Fetch thumbnail for OG tags
                const thumbnailUrl = await fetchReelThumbnail(reelId);
                if (thumbnailUrl) {
                    updateOGTags(reelId, thumbnailUrl);
                }

                const embedUrl = `https://www.instagram.com/reel/${reelId}/embed`;

                const iframe = document.createElement('iframe');
                iframe.src = embedUrl;
                iframe.width = '100%';
                iframe.height = '600';
                iframe.frameBorder = '0';
                iframe.scrolling = 'no';
                iframe.allowFullscreen = true;
                iframe.style.borderRadius = '12px';
                iframe.style.backgroundColor = 'transparent';
                iframe.style.minHeight = '450px';
                iframe.loading = 'lazy';

                player.innerHTML = '';
                player.appendChild(iframe);

                const shareUrl = buildShareLink(reelId);
                shareInput.value = shareUrl;
                shareSection.style.display = 'flex';
                attribution.style.display = 'block';

                if (window.history && window.history.pushState) {
                    window.history.pushState({ reelId }, '', `?reel=${reelId}`);
                }

            } catch (err) {
                errorDiv.textContent = err.message || 'Something went wrong. Please try again.';
                errorDiv.style.display = 'block';
                player.innerHTML = `
                    <div class="placeholder-icon">🎬</div>
                    <span>Enter a valid Reel link to view it here</span>
                `;
                shareSection.style.display = 'none';
                attribution.style.display = 'none';
            }
        }

        // --- Load from URL parameter ---
        function loadFromParams() {
            const params = new URLSearchParams(window.location.search);
            const reelParam = params.get('reel');
            if (reelParam) {
                const fullUrl = `https://instagram.com/reel/${reelParam}/`;
                input.value = fullUrl;
                loadReelWithIframe(fullUrl);
            }
        }

        // --- Copy to Clipboard ---
        async function copyShareLink() {
            try {
                await navigator.clipboard.writeText(shareInput.value);
                const originalText = copyBtn.textContent;
                copyBtn.textContent = '✅ Copied!';
                setTimeout(() => { copyBtn.textContent = originalText; }, 2000);
            } catch {
                shareInput.select();
                document.execCommand('copy');
                const originalText = copyBtn.textContent;
                copyBtn.textContent = '✅ Copied!';
                setTimeout(() => { copyBtn.textContent = originalText; }, 2000);
            }
        }

        // --- Event Listeners ---
        loadBtn.addEventListener('click', () => {
            const url = input.value.trim();
            if (url) loadReelWithIframe(url);
        });

        input.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                const url = input.value.trim();
                if (url) loadReelWithIframe(url);
            }
        });

        copyBtn.addEventListener('click', copyShareLink);
        window.addEventListener('popstate', loadFromParams);

        // --- Load on startup ---
        loadFromParams();
    </script>

</body>
</html>
