<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reel Viewer</title>
    <style>
        /* --- Reset & Base --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
            background: #f5f5f5;
            display: flex;
            justify-content: center;
            padding: 40px 20px;
        }

        /* --- App Container --- */
        .container {
            max-width: 600px;
            width: 100%;
            background: white;
            border-radius: 16px;
            padding: 30px 24px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }

        h1 {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 8px;
            color: #1a1a1a;
        }

        .subtitle {
            color: #666;
            font-size: 14px;
            margin-bottom: 24px;
        }

        /* --- Search Bar --- */
        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 24px;
        }

            .search-box input {
                flex: 1;
                padding: 12px 16px;
                border: 2px solid #ddd;
                border-radius: 10px;
                font-size: 15px;
                outline: none;
                transition: border-color 0.2s;
            }

                .search-box input:focus {
                    border-color: #0095f6;
                }

                .search-box input::placeholder {
                    color: #999;
                }

            .search-box button {
                padding: 12px 24px;
                background: #0095f6;
                color: white;
                border: none;
                border-radius: 10px;
                font-size: 15px;
                font-weight: 600;
                cursor: pointer;
                transition: background 0.2s;
                white-space: nowrap;
            }

                .search-box button:hover {
                    background: #0077cc;
                }

        /* --- Share URL Display --- */
        .share-section {
            background: #f0f0f0;
            border-radius: 10px;
            padding: 12px 16px;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

            .share-section input {
                flex: 1;
                background: transparent;
                border: none;
                font-size: 13px;
                color: #333;
                outline: none;
                padding: 4px 0;
            }

                .share-section input::selection {
                    background: #0095f6;
                    color: white;
                }

            .share-section button {
                background: none;
                border: none;
                color: #0095f6;
                font-weight: 600;
                font-size: 13px;
                cursor: pointer;
                padding: 4px 8px;
            }

                .share-section button:hover {
                    color: #0077cc;
                }

        /* --- Player Container --- */
        #player-container {
            min-height: 200px;
            background: #fafafa;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #999;
            font-size: 14px;
            padding: 20px;
            overflow: hidden;
        }

            #player-container iframe {
                max-width: 100%;
                border: none;
                border-radius: 8px;
            }

        /* --- Error Message --- */
        .error {
            color: #d32f2f;
            background: #ffebee;
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 16px;
            display: none;
        }

        /* --- Loading --- */
        .loading {
            color: #0095f6;
        }

        /* --- Responsive --- */
        @media (max-width: 480px) {
            .container {
                padding: 20px 16px;
            }

            .search-box {
                flex-direction: column;
            }

                .search-box button {
                    width: 100%;
                }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📱 Reel Viewer</h1>
        <p class="subtitle">Paste any public Instagram Reel link to watch it here</p>

        <!-- Error Display -->
        <div id="error" class="error"></div>

        <!-- Search Bar -->
        <div class="search-box">
            <input type="text" id="reelInput" placeholder="https://instagram.com/reel/..." />
            <button id="loadButton">▶ Load Reel</button>
        </div>

        <!-- Shareable Link -->
        <div class="share-section" id="shareSection" style="display: none;">
            <span style="font-size:13px; color:#666;">🔗 Share this link:</span>
            <input type="text" id="shareInput" readonly />
            <button id="copyButton">Copy</button>
        </div>

        <!-- Player -->
        <div id="player-container">
            <span>Paste a link above to view the Reel</span>
        </div>
    </div>

    <script>// --- DOM Elements ---
        const input = document.getElementById('reelInput');
        const loadBtn = document.getElementById('loadButton');
        const player = document.getElementById('player-container');
        const errorDiv = document.getElementById('error');
        const shareSection = document.getElementById('shareSection');
        const shareInput = document.getElementById('shareInput');
        const copyBtn = document.getElementById('copyButton');

        // --- Extract Instagram Reel ID from URL ---
        function extractReelId(url) {
            const match = url.match(/instagram\.com\/reel\/([A-Za-z0-9_-]+)/);
            return match ? match[1] : null;
        }

        // --- Build Shareable Link ---
        function buildShareLink(reelId) {
            // Use your actual domain here
            return `${window.location.origin}/?reel=${reelId}`;
        }

        // --- Load Reel from URL (Tokenless oEmbed) ---
        async function loadReel(url) {
            try {
                // Show loading
                player.innerHTML = `<span class="loading">⏳ Loading Reel...</span>`;
                errorDiv.style.display = 'none';

                // Validate URL
                const reelId = extractReelId(url);
                if (!reelId) {
                    throw new Error('Invalid Instagram Reel URL. Please paste a link like: https://instagram.com/reel/...');
                }

                // Call Meta's tokenless oEmbed API
                const apiUrl = `https://graph.facebook.com/v25.0/instagram_oembed?url=${encodeURIComponent(url)}`;
                const response = await fetch(apiUrl);

                if (!response.ok) {
                    const errorData = await response.json();
                    throw new Error(errorData.error?.message || 'Failed to load Reel. Make sure it\'s public and embedding is enabled.');
                }

                const data = await response.json();

                // Render the embed
                player.innerHTML = data.html;

                // Show shareable link
                const shareUrl = buildShareLink(reelId);
                shareInput.value = shareUrl;
                shareSection.style.display = 'flex';

                // Update URL without reloading (optional)
                if (window.history && window.history.pushState) {
                    window.history.pushState({}, '', `/?reel=${reelId}`);
                }

            } catch (err) {
                errorDiv.textContent = err.message || 'Something went wrong. Please try again.';
                errorDiv.style.display = 'block';
                player.innerHTML = `<span style="color:#999;">Enter a valid Reel link to view it here</span>`;
                shareSection.style.display = 'none';
            }
        }

        // --- Load from URL parameter on page load ---
        function loadFromParams() {
            const params = new URLSearchParams(window.location.search);
            const reelParam = params.get('reel');
            if (reelParam) {
                // Try to construct full URL from just the ID
                const fullUrl = `https://instagram.com/reel/${reelParam}`;
                input.value = fullUrl;
                loadReel(fullUrl);
            }
        }

        // --- Copy to Clipboard ---
        function copyShareLink() {
            shareInput.select();
            try {
                navigator.clipboard.writeText(shareInput.value);
                copyBtn.textContent = 'Copied!';
                setTimeout(() => { copyBtn.textContent = 'Copy'; }, 2000);
            } catch {
                document.execCommand('copy');
                copyBtn.textContent = 'Copied!';
                setTimeout(() => { copyBtn.textContent = 'Copy'; }, 2000);
            }
        }

        // --- Event Listeners ---
        loadBtn.addEventListener('click', () => {
            const url = input.value.trim();
            if (url) loadReel(url);
        });

        input.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                const url = input.value.trim();
                if (url) loadReel(url);
            }
        });

        copyBtn.addEventListener('click', copyShareLink);

        // --- Handle browser back/forward ---
        window.addEventListener('popstate', () => {
            loadFromParams();
        });

        // --- Load on startup ---
        loadFromParams();</script>
</body>
</html>
