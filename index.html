<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reel Viewer</title>
    <style>
        /* --- Reset & Base --- */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
            background: #f5f5f5;
            display: flex;
            justify-content: center;
            padding: 40px 20px;
            min-height: 100vh;
        }
        
        .container {
            max-width: 650px;
            width: 100%;
            background: white;
            border-radius: 16px;
            padding: 30px 24px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        
        h1 {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 8px;
            color: #1a1a1a;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .subtitle {
            color: #666;
            font-size: 14px;
            margin-bottom: 24px;
        }
        
        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 16px;
        }
        .search-box input {
            flex: 1;
            padding: 12px 16px;
            border: 2px solid #ddd;
            border-radius: 10px;
            font-size: 15px;
            outline: none;
            transition: border-color 0.2s;
            background: #fafafa;
        }
        .search-box input:focus {
            border-color: #0095f6;
            background: white;
        }
        .search-box input::placeholder {
            color: #999;
        }
        .search-box button {
            padding: 12px 28px;
            background: #0095f6;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            white-space: nowrap;
        }
        .search-box button:hover {
            background: #0077cc;
        }
        
        #error {
            color: #d32f2f;
            background: #ffebee;
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 16px;
            display: none;
            font-size: 14px;
        }
        
        .share-section {
            background: #f0f0f0;
            border-radius: 10px;
            padding: 10px 14px;
            margin-bottom: 20px;
            display: none;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }
        .share-section .label {
            font-size: 13px;
            color: #666;
            font-weight: 500;
        }
        .share-section input {
            flex: 1;
            min-width: 150px;
            background: transparent;
            border: none;
            font-size: 13px;
            color: #333;
            outline: none;
            padding: 4px 0;
            font-family: monospace;
        }
        .share-section button {
            background: none;
            border: none;
            color: #0095f6;
            font-weight: 600;
            font-size: 13px;
            cursor: pointer;
            padding: 4px 10px;
            border-radius: 6px;
            transition: background 0.2s;
        }
        .share-section button:hover {
            background: rgba(0, 149, 246, 0.1);
        }
        
        #player-container {
            min-height: 400px;
            background: #fafafa;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #999;
            font-size: 14px;
            padding: 30px 20px;
            overflow: hidden;
            border: 1px dashed #ddd;
        }
        #player-container .placeholder-icon {
            font-size: 48px;
            margin-bottom: 12px;
            opacity: 0.5;
        }
        
        #player-container .instagram-media {
            max-width: 100% !important;
            min-width: 100% !important;
            width: 100% !important;
            margin: 0 auto !important;
        }
        
        #player-container iframe {
            max-width: 100% !important;
            border: none !important;
            border-radius: 8px;
            background: white;
        }
        
        #player-container > blockquote {
            margin: 0 !important;
            max-width: 100% !important;
            min-width: 100% !important;
            width: 100% !important;
        }
        
        .instagram-attribution {
            text-align: center;
            font-size: 11px;
            color: #999;
            margin-top: 8px;
            padding: 4px 0;
        }
        .instagram-attribution a {
            color: #0095f6;
            text-decoration: none;
        }
        .instagram-attribution a:hover {
            text-decoration: underline;
        }
        
        .loading {
            color: #0095f6;
            animation: pulse 1.2s ease-in-out infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }
        
        @media (max-width: 500px) {
            .container { padding: 20px 16px; }
            .search-box { flex-direction: column; }
            .search-box button { width: 100%; justify-content: center; }
            .share-section { flex-direction: column; align-items: stretch; }
            .share-section input { min-width: auto; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📱 Reel Viewer</h1>
        <p class="subtitle">Paste any public Instagram Reel link to watch it here</p>
        
        <div id="error"></div>
        
        <div class="search-box">
            <input type="text" id="reelInput" placeholder="https://instagram.com/reel/..." spellcheck="false" />
            <button id="loadButton">▶ Load Reel</button>
        </div>
        
        <div class="share-section" id="shareSection">
            <span class="label">🔗 Share this link:</span>
            <input type="text" id="shareInput" readonly />
            <button id="copyButton">📋 Copy</button>
        </div>
        
        <div id="player-container">
            <div class="placeholder-icon">🎬</div>
            <span>Paste a link above to view the Reel</span>
        </div>
        
        <div class="instagram-attribution" id="attribution" style="display: none;">
            <span>Content from </span>
            <a href="https://instagram.com" target="_blank" rel="noopener">Instagram</a>
        </div>
    </div>

    <script>
        // --- DOM Elements ---
        const input = document.getElementById('reelInput');
        const loadBtn = document.getElementById('loadButton');
        const player = document.getElementById('player-container');
        const errorDiv = document.getElementById('error');
        const shareSection = document.getElementById('shareSection');
        const shareInput = document.getElementById('shareInput');
        const copyBtn = document.getElementById('copyButton');
        const attribution = document.getElementById('attribution');
        
        // --- Helper Functions ---
        function normalizeInstagramUrl(input) {
            let url = input.trim();
            if (/^[A-Za-z0-9_-]+$/.test(url)) {
                return `https://instagram.com/reel/${url}/`;
            }
            if (!url.startsWith('http://') && !url.startsWith('https://')) {
                url = 'https://' + url;
            }
            return url;
        }
        
        function extractReelId(url) {
            const match = url.match(/instagram\.com\/reel\/([A-Za-z0-9_-]+)/);
            return match ? match[1] : null;
        }
        
        function buildShareLink(reelId) {
            return `${window.location.origin}${window.location.pathname}?reel=${reelId}`;
        }
        
        // --- Load Reel with Proper Script Reload ---
        async function loadReel(rawInput) {
            try {
                const normalizedUrl = normalizeInstagramUrl(rawInput);
                player.innerHTML = `<span class="loading">⏳ Loading Reel...</span>`;
                errorDiv.style.display = 'none';
                errorDiv.textContent = '';
                attribution.style.display = 'none';
                
                const reelId = extractReelId(normalizedUrl);
                if (!reelId) {
                    throw new Error('Invalid Instagram Reel URL. Please paste a link like: https://instagram.com/reel/...');
                }
                
                input.value = normalizedUrl;
                
                // Call Meta's tokenless oEmbed API
                const apiUrl = `https://graph.facebook.com/v25.0/instagram_oembed?url=${encodeURIComponent(normalizedUrl)}`;
                const response = await fetch(apiUrl);
                
                if (!response.ok) {
                    let errorMsg = 'Failed to load Reel. ';
                    try {
                        const errorData = await response.json();
                        errorMsg += errorData.error?.message || 'Make sure it\'s public and embedding is enabled.';
                    } catch {
                        errorMsg += 'Make sure it\'s public and embedding is enabled.';
                    }
                    throw new Error(errorMsg);
                }
                
                const data = await response.json();
                
                // --- FIX: Properly reload Instagram's embed script ---
                // Insert the embed HTML
                player.innerHTML = data.html;
                
                // Remove any existing Instagram embed script
                const existingScript = document.querySelector('script[src*="instagram.com/embed.js"]');
                if (existingScript) {
                    existingScript.remove();
                }
                
                // Create and add a fresh script
                const script = document.createElement('script');
                script.src = '//www.instagram.com/embed.js';
                script.async = true;
                script.defer = true;
                
                script.onload = function() {
                    console.log('Instagram embed script loaded successfully');
                };
                
                script.onerror = function() {
                    console.warn('Instagram embed script failed to load');
                };
                
                document.head.appendChild(script);
                // --- END OF FIX ---
                
                // Show Instagram attribution
                attribution.style.display = 'block';
                
                // Show share link
                const shareUrl = buildShareLink(reelId);
                shareInput.value = shareUrl;
                shareSection.style.display = 'flex';
                
                if (window.history && window.history.pushState) {
                    const newUrl = `${window.location.pathname}?reel=${reelId}`;
                    window.history.pushState({ reelId }, '', newUrl);
                }
                
            } catch (err) {
                errorDiv.textContent = err.message || 'Something went wrong. Please try again.';
                errorDiv.style.display = 'block';
                player.innerHTML = `
                    <div class="placeholder-icon">🎬</div>
                    <span>Enter a valid Reel link to view it here</span>
                `;
                shareSection.style.display = 'none';
                attribution.style.display = 'none';
            }
        }
        
        // --- Load from URL parameter on page load ---
        function loadFromParams() {
            const params = new URLSearchParams(window.location.search);
            const reelParam = params.get('reel');
            if (reelParam) {
                const fullUrl = `https://instagram.com/reel/${reelParam}/`;
                input.value = fullUrl;
                loadReel(fullUrl);
            }
        }
        
        // --- Copy to Clipboard ---
        async function copyShareLink() {
            try {
                await navigator.clipboard.writeText(shareInput.value);
                const originalText = copyBtn.textContent;
                copyBtn.textContent = '✅ Copied!';
                setTimeout(() => { copyBtn.textContent = originalText; }, 2000);
            } catch {
                shareInput.select();
                document.execCommand('copy');
                const originalText = copyBtn.textContent;
                copyBtn.textContent = '✅ Copied!';
                setTimeout(() => { copyBtn.textContent = originalText; }, 2000);
            }
        }
        
        // --- Event Listeners ---
        loadBtn.addEventListener('click', () => {
            const url = input.value.trim();
            if (url) loadReel(url);
        });
        
        input.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                const url = input.value.trim();
                if (url) loadReel(url);
            }
        });
        
        copyBtn.addEventListener('click', copyShareLink);
        window.addEventListener('popstate', loadFromParams);
        
        // --- Load on startup ---
        loadFromParams();
    </script>
</body>
</html>
